<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoA Fest - Next Generation Capacity Extension Exhibition</title>
    <style>
        /* カラーパレットと基本設定 */
        :root {
            --bg-color: #050505;
            --bg-card: rgba(17, 17, 17, 0.7);
            --text-main: #f0f0f0;
            --text-muted: #a0a0a0;
            --logo-gradient: linear-gradient(135deg, #ff9800, #ff3500);
            --accent-color: #ff5722;
            --cyber-blue: #00f3ff;
            --hover-glow: 0 0 25px rgba(0, 243, 255, 0.6);
            --transition-main: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* カスタムカーソル */
        body {
            cursor: none;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        .cursor {
            position: fixed;
            top: 0; left: 0;
            width: 8px; height: 8px;
            background: var(--cyber-blue);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 9999;
            box-shadow: 0 0 10px var(--cyber-blue);
            transition: width 0.2s, height 0.2s;
        }

        .cursor-follower {
            position: fixed;
            top: 0; left: 0;
            width: 40px; height: 40px;
            border: 1px solid rgba(0, 243, 255, 0.5);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 9998;
            transition: transform 0.1s ease-out, width 0.2s, height 0.2s, background 0.2s;
        }

        /* 3D サイバーグリッド背景 */
        .grid-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            perspective: 1000px;
            z-index: -2;
            overflow: hidden;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }
        .grid-plane {
            position: absolute;
            width: 200%; height: 200%;
            bottom: -50%; left: -50%;
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.3) 1px, transparent 1px);
            background-size: 60px 60px;
            transform: rotateX(75deg);
            animation: grid-move 4s linear infinite;
        }
        .grid-plane::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 100%);
        }
        @keyframes grid-move {
            0% { transform: rotateX(75deg) translateY(0); }
            100% { transform: rotateX(75deg) translateY(60px); }
        }

        /* グラデーションテキスト用のユーティリティ */
        .text-gradient {
            background: var(--logo-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }

        /* ヘッダー */
        header {
            background: rgba(5, 5, 5, 0.6);
            backdrop-filter: blur(20px);
            padding: 1.2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%;
            box-sizing: border-box;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(0, 243, 255, 0.2);
            transition: all 0.4s ease;
        }
        header.scrolled {
            background: rgba(0, 0, 0, 0.9);
            padding: 0.8rem 5%;
            border-bottom: 1px solid var(--accent-color);
        }
        header h1 {
            margin: 0;
            font-size: 1.5rem;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
        }
        header h1 .logo-part {
            width: 25px;
            height: 25px;
            background: var(--cyber-blue);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            margin-right: 12px;
            box-shadow: 0 0 15px var(--cyber-blue);
            animation: pulse-glow 2s infinite alternate;
        }
        @keyframes pulse-glow {
            0% { filter: drop-shadow(0 0 5px var(--cyber-blue)); transform: scale(1); }
            100% { filter: drop-shadow(0 0 15px var(--cyber-blue)); transform: scale(1.1); }
        }
        nav a {
            margin-left: 30px;
            text-decoration: none;
            color: var(--text-main);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: var(--transition-main);
            position: relative;
        }
        nav a:hover {
            color: var(--cyber-blue);
            text-shadow: 0 0 8px var(--cyber-blue);
        }

        /* ヒーローセクション */
        .hero {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            min-height: 100vh;
            padding: 100px 20px 50px;
            position: relative;
            z-index: 1;
        }
        
        /* メインコンセプト：でかでかと表示 */
        .concept-title {
            font-size: clamp(3rem, 7vw, 7rem);
            font-weight: 900;
            color: #fff;
            margin: 0 0 20px 0;
            line-height: 1.2;
            letter-spacing: 8px;
            text-shadow: 0 0 20px rgba(0, 243, 255, 0.8), 0 0 40px rgba(0, 243, 255, 0.4);
            animation: title-assemble 2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            opacity: 0;
            transform: translateZ(100px) scale(1.2);
            position: relative;
        }
        .concept-title span {
            color: var(--cyber-blue);
        }
        @keyframes title-assemble {
            0% { opacity: 0; filter: blur(20px); transform: translateZ(100px) scale(1.2); }
            100% { opacity: 1; filter: blur(0); transform: translateZ(0) scale(1); }
        }

        /* グリッチエフェクト付きのサブタイトル */
        .glitch {
            font-size: 2rem;
            font-weight: bold;
            color: var(--accent-color);
            position: relative;
            margin-bottom: 10px;
            letter-spacing: 5px;
            text-transform: uppercase;
        }
        .glitch::before, .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: transparent;
        }
        .glitch::before {
            left: 3px;
            text-shadow: -2px 0 var(--cyber-blue);
            clip: rect(24px, 550px, 90px, 0);
            animation: glitch-anim-2 3s infinite linear alternate-reverse;
        }
        .glitch::after {
            left: -3px;
            text-shadow: -2px 0 #ff00c8;
            clip: rect(85px, 550px, 140px, 0);
            animation: glitch-anim 2.5s infinite linear alternate-reverse;
        }
        @keyframes glitch-anim {
            0% { clip: rect(10px, 9999px, 31px, 0); }
            20% { clip: rect(62px, 9999px, 98px, 0); }
            40% { clip: rect(29px, 9999px, 14px, 0); }
            60% { clip: rect(81px, 9999px, 5px, 0); }
            80% { clip: rect(44px, 9999px, 91px, 0); }
            100% { clip: rect(9px, 9999px, 66px, 0); }
        }
        @keyframes glitch-anim-2 {
            0% { clip: rect(65px, 9999px, 100px, 0); }
            20% { clip: rect(12px, 9999px, 55px, 0); }
            40% { clip: rect(89px, 9999px, 34px, 0); }
            60% { clip: rect(4px, 9999px, 77px, 0); }
            80% { clip: rect(45px, 9999px, 12px, 0); }
            100% { clip: rect(98px, 9999px, 23px, 0); }
        }

        .hero p.subtitle {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 60px;
            letter-spacing: 4px;
            opacity: 0;
            animation: fade-in-up 1s ease-out 1s forwards;
            font-family: 'Courier New', Courier, monospace;
        }

        /* ホログラム風の開催情報カード */
        .info-card {
            background: linear-gradient(135deg, rgba(15, 15, 15, 0.8), rgba(5, 5, 5, 0.9));
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 243, 255, 0.3);
            padding: 40px;
            border-radius: 4px;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.1), inset 0 0 20px rgba(0, 243, 255, 0.05);
            text-align: left;
            position: relative;
            opacity: 0;
            animation: fade-in-up 1s ease-out 1.5s forwards;
            width: 100%;
            max-width: 800px;
            overflow: hidden;
        }
        .info-card::before, .info-card::after {
            content: ''; position: absolute; width: 30px; height: 30px; border-color: var(--cyber-blue); border-style: solid;
        }
        .info-card::before { top: 0; left: 0; border-width: 2px 0 0 2px; }
        .info-card::after { bottom: 0; right: 0; border-width: 0 2px 2px 0; }

        .info-card h4 {
            color: var(--cyber-blue);
            margin-top: 0; margin-bottom: 30px; font-size: 1.5rem; letter-spacing: 4px;
            text-align: center; text-transform: uppercase;
        }
        .info-grid { display: grid; grid-template-columns: 1fr 1.5fr; gap: 30px; }
        .info-block {
            background: rgba(0, 243, 255, 0.03); border: 1px solid rgba(0, 243, 255, 0.1);
            padding: 25px; transition: var(--transition-main);
            position: relative;
        }
        .info-block:hover {
            border-color: var(--cyber-blue); box-shadow: inset 0 0 15px rgba(0, 243, 255, 0.2);
            transform: translateZ(10px);
        }
        .info-label {
            color: var(--accent-color); font-size: 0.85rem; font-weight: bold; letter-spacing: 2px;
            text-transform: uppercase; margin-bottom: 15px; display: flex; align-items: center; gap: 8px;
        }
        .info-label svg { fill: currentColor; width: 16px; height: 16px; }
        .venue-name { font-size: 1.5rem; font-weight: bold; color: #fff; margin: 0; }
        .venue-sub { display: block; font-size: 1rem; color: var(--cyber-blue); margin-top: 5px; font-family: 'Courier New', Courier, monospace; }
        .schedule-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 15px; }
        .schedule-list li { display: flex; justify-content: space-between; align-items: center; padding-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .schedule-list li:last-child { border-bottom: none; padding-bottom: 0; }
        .schedule-date { font-size: 1.2rem; color: #fff; font-weight: bold; letter-spacing: 2px; }
        .schedule-date span { font-size: 0.8em; color: var(--cyber-blue); font-weight: normal; }
        .schedule-time {
            font-family: 'Courier New', Courier, monospace; font-size: 1.1rem; color: #000;
            background: var(--cyber-blue); padding: 4px 15px; font-weight: bold;
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
        }

        /* 共通セクション設定 */
        section { padding: 120px 10%; position: relative; z-index: 1; }
        .section-title {
            font-size: 3.5rem; text-align: center; margin-bottom: 80px; text-transform: uppercase; letter-spacing: 5px;
            opacity: 0; transform: translateY(30px); transition: var(--transition-main);
            color: #fff; text-shadow: 0 0 10px var(--cyber-blue);
        }
        .section-title.reveal { opacity: 1; transform: translateY(0); }
        section:nth-child(even) { background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(10,10,10,0.8) 50%, rgba(0,0,0,0) 100%); }

        /* 概要セクション */
        .about-text {
            text-align: center; max-width: 800px; margin: 0 auto; color: var(--text-main);
            font-size: 1.2rem; line-height: 2; opacity: 0; transform: translateY(30px);
            transition: var(--transition-main); padding: 40px;
            border-left: 3px solid var(--accent-color); border-right: 3px solid var(--cyber-blue);
            background: rgba(255, 255, 255, 0.02);
        }
        .about-text.reveal { opacity: 1; transform: translateY(0); }

        /* ゲームセクション (3D Hover Effect) */
        .games-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 50px;
            perspective: 1500px;
        }
        .game-card {
            background: var(--bg-card); border: 1px solid rgba(255,255,255,0.1);
            position: relative; opacity: 0; transform-style: preserve-3d;
            transform: translateY(50px) translateZ(0);
            transition: opacity 0.6s, border-color 0.4s;
            cursor: none;
        }
        .game-card.reveal { opacity: 1; transform: translateY(0) translateZ(0); }
        
        .game-image {
            width: 100%; height: 250px; background-color: #111; overflow: hidden; position: relative;
            border-bottom: 1px solid rgba(0, 243, 255, 0.2);
        }
        .game-image img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1); }
        .game-image::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, transparent 50%, var(--bg-card) 100%);
        }
        
        .game-info { padding: 30px; transform: translateZ(30px); }
        .game-info h3 { margin: 0 0 15px 0; font-size: 1.5rem; color: #fff; text-shadow: 0 0 5px rgba(255,255,255,0.3); }
        .game-info p.short-desc { color: var(--text-muted); font-size: 1rem; margin: 0 0 25px 0; }
        .view-details {
            display: inline-block; color: var(--cyber-blue); font-size: 0.9rem; font-weight: bold;
            text-transform: uppercase; letter-spacing: 2px; position: relative;
            pointer-events: none;
        }
        .view-details::before {
            content: ''; position: absolute; bottom: -5px; left: 0; width: 0%; height: 2px;
            background: var(--cyber-blue); transition: width 0.3s;
        }
        .game-card:hover .view-details::before { width: 100%; }

        /* その他の展示案内 */
        .more-games-notice {
            margin-top: 80px; padding: 50px 30px; text-align: center; opacity: 0; transform: translateY(30px);
            transition: var(--transition-main); border: 1px dashed rgba(0, 243, 255, 0.4);
            background: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(0, 243, 255, 0.02) 10px, rgba(0, 243, 255, 0.02) 20px);
        }
        .more-games-notice.reveal { opacity: 1; transform: translateY(0); }
        .notice-title { color: var(--accent-color); font-size: 1.8rem; font-weight: bold; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 20px; display: inline-block; }

        /* リンクセクション */
        .connect-section { text-align: center; padding-bottom: 100px; }
        .social-links { display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; }
        .social-btn {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            padding: 15px 40px; background: transparent; border: 1px solid var(--cyber-blue);
            color: var(--cyber-blue); text-decoration: none; font-size: 1rem; font-weight: bold;
            letter-spacing: 2px; text-transform: uppercase; position: relative; overflow: hidden; z-index: 1;
            transition: color 0.3s;
            cursor: pointer;
        }
        .social-btn::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: var(--cyber-blue); z-index: -1; transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .social-btn:hover { color: #000; box-shadow: var(--hover-glow); cursor: none; }
        .social-btn:hover::before { transform: translateX(100%); }
        .social-btn svg { width: 22px; height: 22px; fill: currentColor; }

        /* フッター */
        footer { background: #000; padding: 40px 20px; text-align: center; border-top: 1px solid rgba(0, 243, 255, 0.2); position: relative; z-index: 1; }
        footer p { color: #555; font-size: 0.9rem; margin: 0; letter-spacing: 2px; font-family: 'Courier New', Courier, monospace; }

        /* モーダル（ポップアップ）のスタイル */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .modal.active {
            display: flex;
            opacity: 1;
        }
        .modal-content {
            background: rgba(10, 10, 10, 0.9);
            border: 1px solid var(--cyber-blue);
            padding: 40px;
            max-width: 800px; /* 画像が複数並ぶため少し横幅を広げました */
            width: 90%;
            max-height: 90vh; /* 画面に収まらない時はスクロールできるように */
            overflow-y: auto;
            position: relative;
            box-shadow: 0 0 40px rgba(0, 243, 255, 0.15), inset 0 0 20px rgba(0, 243, 255, 0.05);
            transform: scale(0.9);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .modal.active .modal-content {
            transform: scale(1);
        }
        .modal-content h3 {
            color: #fff;
            font-size: 2rem;
            margin-top: 0;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
            border-bottom: 1px solid rgba(0, 243, 255, 0.3);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        .modal-body {
            color: var(--text-muted);
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 30px;
        }

        /* ----- 新規追加：モーダル内の画像ギャラリー用スタイル ----- */
        .modal-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 25px;
        }
        .modal-gallery img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            border: 1px solid rgba(0, 243, 255, 0.3);
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
        }

        /* アニメーション */
        @keyframes fade-in-up { 0% { opacity: 0; transform: translateY(40px); } 100% { opacity: 1; transform: translateY(0); } }

        /* スマホ対応 */
        @media (max-width: 768px) {
            .concept-title { font-size: 3rem; }
            .info-grid { grid-template-columns: 1fr; gap: 20px; }
            header { flex-direction: column; padding: 15px; }
            nav { margin-top: 15px; }
            nav a { margin: 0 10px; font-size: 0.8rem; }
            .social-btn { width: 100%; box-sizing: border-box; }
            body, .game-card, .social-btn:hover { cursor: auto; }
            .cursor, .cursor-follower { display: none; }
            .modal-gallery { grid-template-columns: 1fr; } /* スマホでは画像を縦1列に */
        }
    </style>
</head>
<body>

    <div class="grid-bg"><div class="grid-plane"></div></div>

    <div class="cursor"></div>
    <div class="cursor-follower"></div>

    <header id="header">
        <h1>
            <div class="logo-part"></div>
            <span style="color:#fff; letter-spacing: 3px;">IoA Fest</span>
        </h1>
        <nav>
            <a href="#about">About</a>
            <a href="#games">Exhibitions</a>
            <a href="#info">Info</a>
        </nav>
    </header>

    <div class="hero">
        <h2 class="glitch" data-text="IoAフェス 2026">IoAフェス 2026</h2>
        <div class="concept-title">現実から、<br><span>VR</span>の最前線へ。</div>
        <p class="subtitle">Next Generation Capacity Extension Exhibition</p>
        
        <div id="info" class="info-card">
            <h4>Terminal Access</h4>
            <div class="info-grid">
                <div class="info-block">
                    <div class="info-label">
                        <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                        Location
                    </div>
                    <p class="venue-name">27号館</p>
                    <span class="venue-sub">// Eagle Gallery</span>
                </div>

                <div class="info-block">
                    <div class="info-label">
                        <svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>
                        Timeline
                    </div>
                    <ul class="schedule-list">
                        <li>
                            <span class="schedule-date">4.23 <span>(Thu)</span></span>
                            <span class="schedule-time">17:30 - 20:00</span>
                        </li>
                        <li>
                            <span class="schedule-date">4.24 <span>(Fri)</span></span>
                            <span class="schedule-time">17:30 - 20:00</span>
                        </li>
                        <li>
                            <span class="schedule-date">4.26 <span>(Sun)</span></span>
                            <span class="schedule-time">10:00 - 15:00</span>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <section id="about">
        <h2 class="section-title">System Overview</h2>
        <p class="about-text">
            IoAフェスは、クリエイターたちが情熱を注いで制作した最新のゲームタイトルが集結する展示イベントです。<br><br>
            <span style="color:var(--cyber-blue); font-weight:bold;">「能力拡張（IoA）」</span>をテーマに、27号館 Eagle Galleryにて、これまでにない新しい体験と驚きをお届けします。<br><br>
            皆様のアクセスをお待ちしております。
        </p>
    </section>

    <section id="games">
        <h2 class="section-title">Simulations</h2>
        <div class="games-grid">
            
            <div class="game-card">
                
                <div class="game-image">
                    <img src="images/cover1.png" alt="VRシューティングのプレイ画面">
                </div>
                
                <div class="game-info">
                    <h3>VRシューティング</h3>
                    <p class="short-desc">次世代VR体験を提供するシューティングゲーム。感覚を拡張せよ。</p>
                    <span class="view-details">Initialize</span>
                </div>

                <div class="modal-hidden-data" style="display: none;">
                    <div class="full-desc">
