                データを受信中...
            </div>
            <a href="#" id="return-site-btn" class="social-btn" style="margin-top: 20px; display: inline-flex;">
                元のサイトに戻る
            </a>
        </div>
    </div>

    <script>
        // カスタムカーソル追従処理
        const cursor = document.querySelector('.cursor');
        const follower = document.querySelector('.cursor-follower');
        
        if (window.matchMedia("(pointer: fine)").matches) {
            document.addEventListener('mousemove', (e) => {
                cursor.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
                follower.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
            });

            const links = document.querySelectorAll('a, .game-card');
            links.forEach(link => {
                link.addEventListener('mouseenter', () => {
                    cursor.style.width = '12px';
                    cursor.style.height = '12px';
                    follower.style.width = '60px';
                    follower.style.height = '60px';
                    follower.style.background = 'rgba(0, 243, 255, 0.1)';
                });
                link.addEventListener('mouseleave', () => {
                    cursor.style.width = '8px';
                    cursor.style.height = '8px';
                    follower.style.width = '40px';
                    follower.style.height = '40px';
                    follower.style.background = 'transparent';
                });
            });
        }

        // モーダルの要素取得
        const modal = document.getElementById('game-modal');
        const modalTitle = document.getElementById('modal-title');
        const modalDesc = document.getElementById('modal-desc');
        const returnSiteBtn = document.getElementById('return-site-btn');

        // カードの3Dホバー＆クリックイベント（★ここを書き換えました）
        const cards = document.querySelectorAll('.game-card');
        cards.forEach(card => {
            // 3Dホバー処理
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                const rotateX = ((y - centerY) / centerY) * -15; 
                const rotateY = ((x - centerX) / centerX) * 15;  

                card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.05, 1.05, 1.05)`;
                card.style.borderColor = 'rgba(0, 243, 255, 0.6)';
            });

            card.addEventListener('mouseleave', () => {
                card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`;
                card.style.borderColor = 'rgba(255, 255, 255, 0.1)';
            });

            // クリック（モーダル表示）処理
            card.addEventListener('click', () => {
                const title = card.querySelector('h3').innerText;
                
                // 【変更点】裏に隠しておいた「全文」と「追加画像」を取得する
                const fullDesc = card.querySelector('.full-desc').innerHTML;
                const subImages = card.querySelectorAll('.sub-img');
                
                // モーダルのタイトルをセット
                modalTitle.innerText = title;
                
                // モーダルの中身（HTML）を組み立てる
                let modalHtml = `<div style="margin-bottom: 20px;">${fullDesc}</div>`;
                
                // もし追加の画像（sub-img）が存在していれば、ギャラリーを作ってくっつける
                if (subImages.length > 0) {
                    modalHtml += `<div class="modal-gallery">`;
                    subImages.forEach(img => {
                        modalHtml += img.outerHTML; // 画像タグをそのままコピー
                    });
                    modalHtml += `</div>`;
                }

                // 組み立てた中身をモーダルに流し込んで表示！
                modalDesc.innerHTML = modalHtml;
                modal.classList.add('active');
            });
        });

        // 「元のサイトに戻る」ボタン
        returnSiteBtn.addEventListener('click', (e) => {
            e.preventDefault();
            modal.classList.remove('active');
        });

        // モーダルの外側の黒い背景をクリック
        window.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.classList.remove('active');
            }
        });

        // スクロール時のヘッダー変化
        const header = document.getElementById('header');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                header.classList.add('scrolled');
            } else {
                header.classList.remove('scrolled');
            }
        });

        // スクロール出現アニメーション
        const revealElements = document.querySelectorAll('.section-title, .about-text, .game-card, .more-games-notice');
        const observer = new IntersectionObserver((entries) => {
            entries.forEach((entry) => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('reveal');
                }
            });
        }, {
            threshold: 0.1,
            rootMargin: '0px 0px -50px 0px'
        });

        revealElements.forEach((el) => {
            observer.observe(el);
        });
    </script>
